<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Payment | Toku</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); max-width: 400px; width: 90%; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #6c63ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: none; margin-top: 20px; padding: 10px 25px; background: linear-gradient(135deg, #6c63ff, #48c6ef); color: white; text-decoration: none; border-radius: 25px; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <div id="loader" class="loader"></div>
    <h2 id="status">Verifying Transaction...</h2>
    <p id="message">Please do not close this window or refresh.</p>
    <a href="dashboard.html" id="homeBtn" class="btn">Go to Dashboard</a>
</div>
<script>
async function verifyPayment() {
    const urlParams = new URLSearchParams(window.location.search);
    const reference = urlParams.get('reference');
    const token = localStorage.getItem('token');
    const statusEl = document.getElementById('status');
    const msgEl = document.getElementById('message');
    const loader = document.getElementById('loader');
    const homeBtn = document.getElementById('homeBtn');

    if (!reference) {
        statusEl.innerText = "Error";
        msgEl.innerText = "No transaction reference found.";
        loader.style.display = 'none';
        homeBtn.style.display = 'inline-block';
        return;
    }

    try {
        const res = await fetch(`/api/pay/verify/${reference}`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
        });
        const data = await res.json();

        loader.style.display = 'none';
        homeBtn.style.display = 'inline-block';

        if (res.ok && data.success === true) {
            statusEl.innerText = "Payment Successful!";
            msgEl.innerText = "Your investment package has been activated. Redirecting...";
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);
        } else {
            statusEl.innerText = "Payment Failed";
            msgEl.innerText = data.message || "We couldn't verify your payment. Please contact support.";
        }
    } catch (err) {
        console.error(err);
        loader.style.display = 'none';
        statusEl.innerText = "Connection Error";
        msgEl.innerText = "Something went wrong. Please check your internet and try again.";
        homeBtn.style.display = 'inline-block';
    }
}
window.onload = verifyPayment;
</script>
</body>
</html>
