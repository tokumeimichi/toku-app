<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Toku Invest</title>
  <meta name="google-site-verification" content="zMy4QjzCbL5a13A6XQXhjl_fINgzO7rInKSenTPg_1E" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .wrapper { width: 100%; max-width: 440px; }
    .card { border: none; border-radius: 20px; background: #fff; box-shadow: 0 25px 60px rgba(0,0,0,0.4); overflow: hidden; }
    .card-top {
      background: linear-gradient(135deg, #6c63ff, #48c6ef);
      padding: 28px 40px 22px;
      text-align: center;
      color: #fff;
    }
    .card-top .avatar { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 12px; }
    .card-top h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 2px; }
    .card-top p { font-size: 0.85rem; opacity: 0.85; margin: 0; }
    .card-body-custom { padding: 28px 32px 24px; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .form-control { border-radius: 10px; border: 1.5px solid #e0e0e0; padding: 10px 14px; font-size: 0.92rem; font-family: 'Poppins', sans-serif; background: #fafafa; }
    .form-control:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.15); background: #fff; outline: none; }
    .btn-login { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #6c63ff, #48c6ef); color: #fff; font-size: 0.98rem; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; margin-top: 6px; transition: opacity 0.2s, transform 0.15s; }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .forgot { text-align: right; margin-top: -6px; margin-bottom: 14px; }
    .forgot a { font-size: 0.8rem; color: #6c63ff; text-decoration: none; }
    .divider { display: flex; align-items: center; gap: 10px; color: #ccc; font-size: 0.78rem; margin: 18px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #ebebeb; }
    .footer-link { text-align: center; font-size: 0.86rem; color: #888; }
    .footer-link a { color: #6c63ff; font-weight: 600; text-decoration: none; }
    .alert-msg { padding: 10px 14px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 14px; display: none; }
    .alert-error { background: #fff0f0; color: #e53e3e; border: 1px solid #fed7d7; }
    .alert-success { background: #f0fff4; color: #38a169; border: 1px solid #c6f6d5; }

    /* Earnings ticker */
    .ticker {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: #fff;
      margin-top: 10px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="card-top">
        <div class="avatar">🔐</div>
        <h2>Welcome Back</h2>
        <p>Log in to claim your daily returns</p>
        <div class="ticker">💰 Users earned ₦2,400 in returns today</div>
      </div>
      <div class="card-body-custom">
        <div class="alert-msg alert-error"   id="errorMsg"></div>
        <div class="alert-msg alert-success" id="successMsg"></div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="abdul@example.com" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required/>
          </div>
          <div class="forgot">
            <a href="#">Forgot password?</a>
          </div>
          <button type="submit" class="btn-login" id="loginBtn">
            🔐 &nbsp;Log In
          </button>
        </form>

        <div class="divider">don't have an account?</div>
        <div class="footer-link">
          <a href="signup.html">Create one here →</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorBox   = document.getElementById('errorMsg');
      const successBox = document.getElementById('successMsg');
      const loginBtn   = document.getElementById('loginBtn');

      errorBox.style.display = successBox.style.display = 'none';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorBox.textContent   = '⚠️ Please fill in all fields.';
        errorBox.style.display = 'block';
        return;
      }

      loginBtn.textContent = 'Logging in...';
      loginBtn.disabled    = true;

      try {
        const res  = await fetch('/api/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token',         data.token);
          localStorage.setItem('userName',      data.name);
          localStorage.setItem('balance',       data.balance);
          localStorage.setItem('referralCode',  data.referral_code);
          successBox.textContent   = '✅ Login successful! Taking you to your dashboard...';
          successBox.style.display = 'block';
          setTimeout(() => window.location.href = 'dashboard.html', 1500);
        } else {
          errorBox.textContent   = '❌ ' + data.message;
          errorBox.style.display = 'block';
          loginBtn.textContent   = '🔐  Log In';
          loginBtn.disabled      = false;
        }
      } catch(err) {
        errorBox.textContent   = '❌ Cannot connect to server. Make sure Node.js is running.';
        errorBox.style.display = 'block';
        loginBtn.textContent   = '🔐  Log In';
        loginBtn.disabled      = false;
      }
    });
  </script>
</body>
</html>
