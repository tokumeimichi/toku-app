<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - Toku Invest</title>
  <meta name="google-site-verification" content="zMy4QjzCbL5a13A6XQXhjl_fINgzO7rInKSenTPg_1E" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }
    .wrapper { width: 100%; max-width: 480px; }
    .card { border: none; border-radius: 20px; background: #fff; box-shadow: 0 25px 60px rgba(0,0,0,0.4); overflow: hidden; }
    .card-top {
      background: linear-gradient(135deg, #6c63ff, #48c6ef);
      padding: 28px 40px 22px;
      text-align: center;
      color: #fff;
    }
    .card-top .avatar { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 12px; }
    .card-top h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 2px; }
    .card-top p { font-size: 0.85rem; opacity: 0.85; margin: 0; }
    .card-body-custom { padding: 28px 32px 24px; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .form-control { border-radius: 10px; border: 1.5px solid #e0e0e0; padding: 10px 14px; font-size: 0.92rem; font-family: 'Poppins', sans-serif; background: #fafafa; }
    .form-control:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.15); background: #fff; outline: none; }
    .referral-box { background: #f5f5ff; border: 1.5px dashed #6c63ff; border-radius: 10px; padding: 10px 14px; font-size: 0.92rem; font-family: 'Poppins', sans-serif; color: #6c63ff; width: 100%; }
    .referral-box::placeholder { color: #aaa; }
    .referral-box:focus { outline: none; border-color: #6c63ff; }
    .strength-row { display: flex; gap: 4px; margin-top: 6px; }
    .strength-seg { flex: 1; height: 4px; border-radius: 4px; background: #e8e8e8; transition: background 0.3s; }
    .strength-text { font-size: 0.73rem; color: #aaa; margin-top: 3px; }
    .btn-signup { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #6c63ff, #48c6ef); color: #fff; font-size: 0.98rem; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; margin-top: 6px; transition: opacity 0.2s, transform 0.15s; }
    .btn-signup:hover { opacity: 0.9; transform: translateY(-1px); }
    .divider { display: flex; align-items: center; gap: 10px; color: #ccc; font-size: 0.78rem; margin: 18px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #ebebeb; }
    .footer-link { text-align: center; font-size: 0.86rem; color: #888; }
    .footer-link a { color: #6c63ff; font-weight: 600; text-decoration: none; }
    .alert-msg { padding: 10px 14px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 14px; display: none; }
    .alert-error { background: #fff0f0; color: #e53e3e; border: 1px solid #fed7d7; }
    .alert-success { background: #f0fff4; color: #38a169; border: 1px solid #c6f6d5; }
    .optional-tag { font-size: 0.72rem; color: #aaa; font-weight: 400; margin-left: 4px; text-transform: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="card-top">
        <div class="avatar">🚀</div>
        <h2>Join Toku Invest</h2>
        <p>Start earning daily returns today</p>
      </div>
      <div class="card-body-custom">
        <div class="alert-msg alert-error"   id="errorMsg"></div>
        <div class="alert-msg alert-success" id="successMsg"></div>

        <form id="signupForm" novalidate>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" placeholder="e.g. Abdul Adinoyi" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="abdul@example.com" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" placeholder="08012345678" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Create a strong password" required/>
            <div class="strength-row">
              <div class="strength-seg" id="seg1"></div>
              <div class="strength-seg" id="seg2"></div>
              <div class="strength-seg" id="seg3"></div>
              <div class="strength-seg" id="seg4"></div>
            </div>
            <div class="strength-text" id="strengthText">Enter a password</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirm" placeholder="Repeat your password" required/>
          </div>
          <div class="mb-3">
            <label class="form-label">
              Referral Code <span class="optional-tag">(optional)</span>
            </label>
            <input type="text" class="referral-box" id="referral" placeholder="Enter referral code if you have one"/>
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="terms" required/>
            <label class="form-check-label" for="terms" style="font-size:0.82rem; color:#666;">
              I agree to the <a href="#" style="color:#6c63ff;">Terms &amp; Conditions</a>
            </label>
          </div>
          <button type="submit" class="btn-signup" id="submitBtn">
            🚀 &nbsp;Create My Account
          </button>
        </form>

        <div class="divider">already have an account?</div>
        <div class="footer-link">
          <a href="login.html">Log in here →</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Check if referral code is in URL
    const urlParams = new URLSearchParams(window.location.search);
    const refCode   = urlParams.get('ref');
    if (refCode) document.getElementById('referral').value = refCode;

    // Password strength
    const pw     = document.getElementById('password');
    const segs   = [1,2,3,4].map(i => document.getElementById('seg'+i));
    const txt    = document.getElementById('strengthText');
    const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
    const labels = ['Weak','Fair','Good','Strong 💪'];

    pw.addEventListener('input', () => {
      const v = pw.value;
      let score = 0;
      if (v.length >= 8)          score++;
      if (/[A-Z]/.test(v))        score++;
      if (/[0-9]/.test(v))        score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      segs.forEach((s,i) => {
        s.style.background = (v.length > 0 && i < score) ? colors[score-1] : '#e8e8e8';
      });
      txt.textContent = v.length === 0 ? 'Enter a password' : labels[score-1];
      txt.style.color = v.length === 0 ? '#aaa' : colors[score-1];
    });

    // Submit
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorBox   = document.getElementById('errorMsg');
      const successBox = document.getElementById('successMsg');
      const submitBtn  = document.getElementById('submitBtn');

      errorBox.style.display = successBox.style.display = 'none';

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const referral = document.getElementById('referral').value.trim();
      const terms    = document.getElementById('terms').checked;

      if (!name || !email || !phone || !password || !confirm) {
        errorBox.textContent   = '⚠️ Please fill in all fields.';
        errorBox.style.display = 'block';
        return;
      }
      if (password !== confirm) {
        errorBox.textContent   = '❌ Passwords do not match!';
        errorBox.style.display = 'block';
        return;
      }
      if (!terms) {
        errorBox.textContent   = '⚠️ Please accept the Terms & Conditions.';
        errorBox.style.display = 'block';
        return;
      }

      submitBtn.textContent = 'Creating account...';
      submitBtn.disabled    = true;

      try {
        const res  = await fetch('/api/signup', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            full_name:     name,
            email,
            phone,
            password,
            referral_code: referral
          })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token',    data.token);
          localStorage.setItem('userName', data.name);
          successBox.textContent   = '✅ Account created! Taking you to your dashboard...';
          successBox.style.display = 'block';
          setTimeout(() => window.location.href = 'dashboard.html', 1500);
        } else {
          errorBox.textContent   = '❌ ' + data.message;
          errorBox.style.display = 'block';
          submitBtn.textContent  = '🚀  Create My Account';
          submitBtn.disabled     = false;
        }
      } catch(err) {
        errorBox.textContent   = '❌ Cannot connect to server. Make sure Node.js is running.';
        errorBox.style.display = 'block';
        submitBtn.textContent  = '🚀  Create My Account';
        submitBtn.disabled     = false;
      }
    });
  </script>
</body>
</html>
