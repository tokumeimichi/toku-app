<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdrawals - Admin | Toku</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #f0f2f5; }
    .sidebar { width: 260px; background: linear-gradient(180deg, #0f0c29, #302b63); min-height: 100vh; position: fixed; }
    .sidebar h3 { color: #fff; padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar a { display: block; color: rgba(255,255,255,0.7); padding: 12px 20px; text-decoration: none; }
    .sidebar a:hover, .sidebar a.active { background: rgba(108,99,255,0.3); color: #fff; }
    .main-content { margin-left: 260px; padding: 20px; }
    table { width: 100%; background: #fff; border-radius: 12px; overflow: hidden; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    .btn-approve { background: #22c55e; color: #fff; border: none; padding: 5px 12px; border-radius: 5px; margin-right: 5px; cursor: pointer; }
    .btn-reject { background: #ef4444; color: #fff; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
    .badge-pending { background: #f59e0b; color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
    .badge-approved { background: #22c55e; }
    .badge-rejected { background: #ef4444; }
    .refresh-btn { background: #6c63ff; color: #fff; border: none; padding: 8px 20px; border-radius: 8px; margin-bottom: 20px; cursor: pointer; }
  </style>
</head>
<body>

<div class="sidebar">
  <h3>Toku Admin</h3>
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="users.html">👥 Users</a>
  <a href="investments.html">💰 Investments</a>
  <a href="withdrawals.html" class="active">💸 Withdrawals</a>
  <a href="login.html" onclick="logout()">🚪 Logout</a>
</div>

<div class="main-content">
  <h2>Withdrawal Requests</h2>
  <button class="refresh-btn" onclick="loadWithdrawals()">🔄 Refresh</button>
  
  <table>
    <thead>
      <tr><th>ID</th><th>User</th><th>Email</th><th>Amount</th><th>Bank</th><th>Account No</th><th>Account Name</th><th>Status</th><th>Date</th><th>Action</th></tr>
    </thead>
    <tbody id="withdrawalsTableBody"><tr><td colspan="10">Loading...</td></tr></tbody>
  </table>
</div>

<script>
const token = localStorage.getItem('adminToken');
if (!token) window.location.href = 'login.html';

async function loadWithdrawals() {
  try {
    const res = await fetch('/api/admin/withdrawals', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const withdrawals = await res.json();
    
    const tbody = document.getElementById('withdrawalsTableBody');
    if (withdrawals.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10">No withdrawal requests</td></tr>';
      return;
    }
    
    tbody.innerHTML = withdrawals.map(w => `
      <tr>
        <td>${w.id}</td>
        <td>${w.full_name}</td>
        <td>${w.email}</td>
        <td>₦${Number(w.amount).toLocaleString()}</td>
        <td>${w.bank_name}</td>
        <td>${w.account_no}</td>
        <td>${w.account_name}</td>
        <td><span class="badge-pending ${w.status === 'approved' ? 'badge-approved' : ''} ${w.status === 'rejected' ? 'badge-rejected' : ''}">${w.status}</span></td>
        <td>${new Date(w.created_at).toLocaleString()}</td>
        <td>
          ${w.status === 'pending' ? `
            <button onclick="updateWithdrawal(${w.id}, 'approved')" class="btn-approve">Approve</button>
            <button onclick="updateWithdrawal(${w.id}, 'rejected')" class="btn-reject">Reject</button>
          ` : '—'}
        </td>
      </tr>
    `).join('');
  } catch (err) {
    console.error(err);
  }
}

async function updateWithdrawal(id, status) {
  if (!confirm(`Are you sure you want to ${status} this withdrawal?`)) return;
  try {
    const res = await fetch(`/api/admin/withdrawals/${id}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ status })
    });
    if (res.ok) {
      alert(`✅ Withdrawal ${status}!`);
      loadWithdrawals();
    } else {
      alert('Failed to update');
    }
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

function logout() {
  localStorage.removeItem('adminToken');
  window.location.href = 'login.html';
}

loadWithdrawals();
setInterval(loadWithdrawals, 15000);
</script>
</body>
</html>
