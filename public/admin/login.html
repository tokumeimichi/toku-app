<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Toku</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
    .login-box { background: #fff; padding: 40px; border-radius: 20px; width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center; }
    .login-box h2 { color: #1a1a2e; margin-bottom: 20px; }
    .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Poppins', sans-serif; }
    .login-box button { width: 100%; padding: 12px; background: linear-gradient(135deg, #6c63ff, #48c6ef); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; }
    .error { color: #ef4444; margin-top: 10px; }
  </style>
</head>
<body>
<div class="login-box">
  <h2>Admin Login</h2>
  <input type="email" id="email" placeholder="Admin Email" autocomplete="off">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login to Admin Panel</button>
  <div id="errorMsg" class="error"></div>
</div>

<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    
    const data = await res.json();
    if (res.ok && data.isAdmin) {
      localStorage.setItem('adminToken', data.token);
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('errorMsg').innerText = data.message || 'Invalid admin credentials';
    }
  } catch (err) {
    document.getElementById('errorMsg').innerText = 'Connection error';
  }
}
</script>
</body>
</html>
